# This is the kitty config file of my dotfiles, tweak this to your needs if you want to use my dotfiles as a base for yours.
# Made by Mattia, btw aka Dario

font_family      GeistMono Nerd Font Propo Bold
bold_font        GeistMono Nerd Font Propo Bold
italic_font      GeistMono NFP SemiBold
bold_italic_font GeistMono NFP SemiBold
font_weight true
font_size 14.0

foreground #cdd6f4
background #1e1e2e

background_opacity 0.92
background_blur 8

cursor #f5e0dc
cursor_shape block
cursor_shape_unfocused hollow
cursor_blink_interval 0
shell_integration no-cursor
cursor_text_color #1e1e2e

selection_foreground #1e1e2e
selection_background #f5e0dc

window_border_width 2
active_border_color     #b4befe
inactive_border_color   #6c7086

window_padding_width 8

mark1_foreground #1e1e2e
mark1_background #b4befe
mark2_foreground #1e1e2e
mark2_background #cba6f7
mark3_foreground #1e1e2e
mark3_background #74c7ec

