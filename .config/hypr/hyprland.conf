# This is the hyprland config file of my dotfiles, tweak this to your needs if you want to use my dotfiles as a base for yours.
# Made by Mattia, btw aka Dario

monitor=HDMI-A-1,1920x1080@240,0x0,1
monitor=eDP-1,1920x1080@144,auto-left,1

$terminal = foot
$fileManager = dolphin
$menu = fuzzel
$terminal2 = alacritty
$termfilemanager = ranger
$reload_waybar = pkill waybar; waybar & disown

exec-once = hyprctl setcursor Adwaita 36
exec-once = waybar & swww-daemon
exec-once = hyprpolkitagent
exec-once = swaync & xdg-desktop-portal & xdg-desktop-portal-hyprland
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,36
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,36

general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2

    col.active_border = rgba(203,166,247,1.000) rgba(186,187,241,1.000) 180deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
        size = 3
        passes = 1
        
        vibrancy = 0.1696
    }

    shadow {
        enabled = false
}

}

animations {
    enabled = true

    bezier = popin_soft, 0.16, 1, 0.3, 1
    bezier = popout_soft, 0.7, 0.05, 0.9, 0.3
    bezier = workspace_pause, 0.12, 0.9, 0.2, 1.05
    bezier = smoothfade, 0.3, 0.0, 0.5, 0.1
    bezier = popin_smooth, 0.3, 0.05, 0.7, 1.1
    bezier = popin_settle, 0.14, 0.95, 0.25, 1.03
    bezier = popout_settle, 0.55, 0.05, 0.85, 0.25
    animation = windowsIn, 1, 1.15, popin_settle
    animation = windowsOut, 1, 0.8, popout_settle
    animation = windowsMove, 1, 3, workspace_pause
    animation = workspaces, 1, 6, workspace_pause, slide

}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = -0.20 
    repeat_rate = 35
    repeat_delay = 200

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.20
}

$mainMod = SUPER
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = SUPER SHIFT, Q, exec, hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, F, fullscreen
bind = $mainMod, Z, exec, waypaper
bind = SUPER SHIFT, D, exec, cliphist list | fuzzel --dmenu --with-nth 2 | cliphist decode | wl-copy
bind = $mainMod, T, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of the region taken" -t 1000
bind = $mainMod, Y, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png | dunstify "Screenshot of whole screen taken" -t 1000
bind = SUPER SHIFT, T, exec, swaync-client -t
bind = SUPER SHIFT, RETURN, exec, $terminal2
bind = SUPER SHIFT, E, exec, kitty -e ranger
bind = SUPER SHIFT, W, exec, cliphist wipe
bind = SUPER, R, exec, $reload_waybar
bind = $mainMod, G, exec, ~/.config/hypr/scripts/toggle-gaps.sh
bind = $mainMod, L, exec, wlogout

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 2%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 2%-

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
