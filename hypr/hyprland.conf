monitor=HDMI-A-1,1920x1080@240,0x0,1
monitor=eDP-1,1920x1080@144,auto-left,1

$terminal = foot
$fileManager = thunar
$menu = fuzzel
$termfilemanager = ranger
$reload_waybar = pkill waybar; waybar & disown

exec-once = hyprctl setcursor Adwaita 36
exec-once = waybar & swww-daemon & mcontrolcenter
exec-once = mako -c ~/.config/mako/config
exec-once = hyprpolkitagent
exec-once = xdg-desktop-portal & xdg-desktop-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP QT_QPA_PLATFORMTHEME
exec-once = wl-paste --type text --watch cliphist store 
exec-once = wl-paste --type image --watch cliphist store

env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,36
env = HYPRCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,36
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = export XDG_CURRENT_DESKTOP=Hyprland
env = export XDG_SESSION_TYPE=wayland

general {
    gaps_in = 2
    gaps_out = 5
    border_size = 2 

    #col.active_border = rgba(203,166,247,1.000) rgba(186,187,241,1.000) 180deg
    col.active_border = rgb(7dcfff) 
    col.inactive_border =  rgba(59,59,59,1)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 0
    rounding_power = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
        size = 3
        passes = 1
        
        vibrancy = 0.1696
    }

    shadow {
        enabled = false
}

}

animations {
    enabled = yes

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 100%
    animation = windowsOut, 1, 4.1, easeOutQuint, popin 100%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    preserve_split = true 
}

master {
    new_status = master
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = -0.20 
    repeat_rate = 35
    repeat_delay = 200

    touchpad {
        natural_scroll = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.20
}

$mainMod = SUPER
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, E, exec, $fileManager
bind = SUPER SHIFT, Q, exec, hyprctl dispatch exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, $menu
bind = SUPER SHIFT, F, fullscreen
bind = $mainMod, W, exec, waypaper
bind = SUPER SHIFT, D, exec, cliphist list | fuzzel --dmenu --with-nth 2 | cliphist decode | wl-copy
bind = $mainMod, T, exec, ~/.config/hypr/scripts/screenshot.sh area
bind = $mainMod, Y, exec, ~/.config/hypr/scripts/screenshot.sh full
bind = SUPER SHIFT, W, exec, cliphist wipe
bind = SUPER, R, exec, $reload_waybar
bind = $mainMod, Slash, exec, ~/.config/hypr/scripts/keybinds.sh
bind = $mainMod, L, exec, wlogout

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
